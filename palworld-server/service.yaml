apiVersion: v1
kind: Service
metadata:
  name: palworld-service
spec:
  type: NodePort
  selector:
    app: palworld-server
  ports:
    - name: steam-discovery
      port: 27015
      targetPort: 27015
      protocol: UDP
    - name: game
      port: 8211
      targetPort: 8211
      protocol: UDP
